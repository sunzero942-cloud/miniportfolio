<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>哲学人格测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background-color: #f5f5f5;
      color: #333;
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 4rem;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: #2c3e50;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 2rem;
      color: #3498db;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .project-content {
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .project-content h2 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: #3498db;
    }

    .project-content p {
      margin-bottom: 1.5rem;
      color: #7f8c8d;
    }

    .demo-section {
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      padding: 2rem;
    }

    .demo-section h2 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: #3498db;
    }

    .demo-container {
      border: 1px solid #ddd;
      border-radius: 4px;
      overflow: hidden;
    }

    .demo-container iframe {
      width: 100%;
      height: 600px;
      border: none;
    }

    .image-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    .gallery-item {
      background-color: white;
      padding: 1rem;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      text-align: center;
      transition: transform 0.3s ease;
    }

    .gallery-item:hover {
      transform: translateY(-5px);
    }

    .gallery-item img {
      width: 100%;
      height: auto;
      border-radius: 4px;
      margin-bottom: 0.5rem;
    }

    footer {
      text-align: center;
      margin-top: 4rem;
      padding: 2rem;
      background-color: #2c3e50;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="index.html" class="back-link">← 返回首页</a>
      <h1>哲学人格测试</h1>
    </header>

    <div class="project-content">
      <h2>项目介绍</h2>
      <p>哲学人格测试是一个基于哲学思想的人格测试工具，帮助用户了解自己的思维方式和价值观倾向。测试通过一系列问题，评估用户在不同哲学维度上的倾向，包括理性与感性、个人主义与集体主义、理想主义与现实主义等。</p>
      <p>测试结果会生成一份详细的分析报告，包括用户的哲学人格类型、核心价值观、思维方式特点以及与不同哲学流派的关联。通过这个测试，用户可以更深入地了解自己的内心世界，发现自己的思维模式和价值取向。</p>
    </div>

    <div class="demo-section">
      <h2>测试演示</h2>
      <div class="demo-container">
        <iframe src="../ptest/test-cover.html"></iframe>
      </div>
    </div>

    <div class="demo-section">
      <h2>项目展示</h2>
      <div class="image-gallery">
        <div class="gallery-item">
          <img src="images.ptest/p1.jpg" alt="哲学人格测试展示图1">
        </div>
        <div class="gallery-item">
          <img src="images.ptest/p2.jpg" alt="哲学人格测试展示图2">
        </div>
        <div class="gallery-item">
          <img src="images.ptest/p3.jpg" alt="哲学人格测试展示图3">
        </div>
        <div class="gallery-item">
          <img src="images.ptest/p4.jpg" alt="哲学人格测试展示图4">
        </div>
        <div class="gallery-item">
          <img src="images.ptest/p5.jpg" alt="哲学人格测试展示图5">
        </div>
        <div class="gallery-item">
          <img src="images.ptest/p6.jpg" alt="哲学人格测试展示图6">
        </div>
        <div class="gallery-item">
          <img src="images.ptest/p7.jpg" alt="哲学人格测试展示图7">
        </div>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 补充小项目</p>
  </footer>
</body>
</html>
